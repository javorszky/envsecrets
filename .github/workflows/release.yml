name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Run in snapshot mode (no publish)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: Run CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  goreleaser-check:
    name: Validate GoReleaser config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  release:
    name: GoReleaser
    runs-on: macos-latest
    needs:
      - ci
      - goreleaser-check
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: anchore/sbom-action/download-syft@v0

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >-
            release
            --clean
            ${{ github.event.inputs.snapshot == 'true' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        if: ${{ github.event.inputs.snapshot == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-artifacts
          path: dist/
          retention-days: 3
